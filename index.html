<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            box-shadow: 3px 3px 3px black;
        }
        #contenedor{
            background-color: beige;
            padding: 20px;
            display: flex;
            justify-content: space-around;
        }
        img {
            width: 200px;
        }
        #contenedor div{
            background-color: white;
            padding: 20px;
            text-align: center;
        }
        table, td{
            border: 2px solid purple;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Jugadores del Real Madrid</h1>
<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A152846390&color=%23423948&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe><div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;"><a href="https://soundcloud.com/omar-abd-alrhman" title="Omar Abd AlRhman" target="_blank" style="color: #cccccc; text-decoration: none;">Omar Abd AlRhman</a> · <a href="https://soundcloud.com/omar-abd-alrhman/hala-madrid-y-nada-mas-la-cancion-de-la-decima-el-nuevo-himno-del-real-madrid" title="&#x27;Hala Madrid Y Nada Más&#x27; - La Canción De La Décima - El Nuevo Himno Del Real Madrid" target="_blank" style="color: #cccccc; text-decoration: none;">&#x27;Hala Madrid Y Nada Más&#x27; - La Canción De La Décima - El Nuevo Himno Del Real Madrid</a></div>

    <div id="contenedor">

    </div>
    <table id="tabla-jugadores">

    </table>
    <script>
        let jugadores=[
            {
                nombre:  "Mbappé",
                edad:  27,
                foto:"images.jpeg",
                ficha:  200000000
            
            },
            {
                nombre:  "Guti",
                edad: 48,
                foto:"1330186260686.webp",
                ficha: 450000000 
            },
            {
                nombre:  "Vegeta",
                edad: 34,
                foto:"vegeta1.jpg",
                ficha: 777 
            },{
                nombre:  "Zidane",
                edad:  83,
                foto:"images2.jpeg",
                ficha:  760000000 
            }
        ]
for (let i=0; i<jugadores.length;i++){
    //jugador=jugadores[i];
    nombreJugador= jugadores[i].nombre;
    edadJugador= jugadores[i].edad;
    fotoJugador=jugadores[i].foto;
    fichaJugador= jugadores[i].ficha;
    nuevaCaja=document.createElement("div");
    nuevoH1=document.createElement("h1");
    nuevoH1.innerHTML=nombreJugador;
    nuevaCaja.appendChild(nuevoH1);
    nuevoH2=document.createElement("h2");
    nuevoH2.innerHTML="Edad: "+ edadJugador;
    nuevaCaja.appendChild(nuevoH2);
    nuevoH3=document.createElement("h3");
    nuevoH3.innerHTML="Ficha: "+ fichaJugador;
    nuevaCaja.appendChild(nuevoH3);
    nuevaFoto=document.createElement("img");
    nuevaFoto.src=fotoJugador;
    nuevaCaja.appendChild(nuevaFoto);
    document.getElementById("contenedor").appendChild(nuevaCaja);
}
let nuevoTRCabecera=document.createElement("tr");
let cabeceraNombre=document.createElement("th");
cabeceraNombre.innerHTML="Nombre";
nuevoTRCabecera.appendChild(cabeceraNombre);
document.getElementById("tabla-jugadores").appendChild(nuevoTRCabecera);

for (jugador of jugadores){
let nuevoTR =document.createElement("tr");
let tdNombre = document.createElement("td");
tdNombre.innerHTML =jugador.nombre;
nuevoTR.appendChild(tdNombre);


let tdEdad = document.createElement("td");
tdEdad.innerHTML =jugador.edad;
nuevoTR.appendChild(tdEdad);


let tdFicha = document.createElement("td");
tdFicha.innerHTML =jugador.ficha;
nuevoTR.appendChild(tdFicha);

let tdFoto = document.createElement("td");
let nuevaFoto=document.createElement("img");
nuevaFoto.src=jugador.foto;
tdFoto.appendChild(nuevaFoto);
nuevoTR.appendChild(tdFoto);
document.getElementById("tabla-jugadores").appendChild(nuevoTR);
}
    </script>
</body>
</html>
